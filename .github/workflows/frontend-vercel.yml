name: frontend-vercel

on:
  pull_request:
    branches: [main]
    paths:
      - 'greenfn-web/**'
      - '.github/workflows/frontend-vercel.yml'
  push:
    branches: [main]
    paths:
      - 'greenfn-web/**'
      - '.github/workflows/frontend-vercel.yml'

jobs:
  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: greenfn-web
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: greenfn-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel preview env
        run: npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build preview artifact
        run: npx vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview
        run: npx vercel deploy --prebuilt --token="$VERCEL_TOKEN"

  production:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: greenfn-web
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: greenfn-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel production env
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production artifact
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
