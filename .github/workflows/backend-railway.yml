name: backend-railway

on:
  push:
    branches: [main]
    paths:
      - "greenfn/**"
      - ".github/workflows/backend-railway.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: greenfn
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: d2602e70-5b23-4c30-8bc0-482b28e93ae0
      RAILWAY_SERVICE_NAME: greenfn-api
      RAILWAY_ENVIRONMENT_NAME: ${{ secrets.RAILWAY_ENVIRONMENT_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        run: npx @railway/cli up --ci --service "$RAILWAY_SERVICE_NAME" --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT_NAME"
